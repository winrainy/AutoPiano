<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>体素世界 · MiniCraft</title>
  <link rel="stylesheet" href="./css/style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "./js/lib/three.module.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="game"></canvas>

  <div id="crosshair"></div>

  <div id="hotbar"></div>

  <div id="overlay">
    <div class="panel">
      <h1>体素世界 · MiniCraft</h1>
      <p class="sub">一个用 Three.js 从零打造的「我的世界」风格沙盒</p>
      <div class="controls">
        <div><b>点击屏幕</b> 开始 / 锁定鼠标</div>
        <div><b>W A S D</b> 移动 · <b>空格</b> 跳跃 · <b>鼠标</b> 转视角</div>
        <div><b>左键</b> 挖掉方块 · <b>右键</b> 放置方块</div>
        <div><b>1–8 / 滚轮</b> 切换方块 · <b>Esc</b> 释放鼠标</div>
      </div>
      <div class="hint">点击此处进入游戏</div>
    </div>
  </div>

  <script type="module" src="./js/game/main.js"></script>
</body>
</html>
